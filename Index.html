<!DOCTYPE html>

<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Zvíře Duše — Projekt Moudrost</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#F0F4FF;
  --white:#FFFFFF;
  --ink:#1A1A2E;
  --ink2:#5A5A7A;
  --ink3:#9999BB;
  --A:#FF6B2B;--Ad:#C43D00;--Ag:rgba(255,107,43,.22);
  --sp:cubic-bezier(.34,1.56,.64,1);
  --ease:cubic-bezier(.4,0,.2,1);
  --r:24px;
}
html,body{min-height:100vh;overflow-x:hidden;font-family:'Nunito',sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}

/* ─── BG BLOBS ─── */
.blob{position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;z-index:0;animation:blobmove 10s ease-in-out infinite}
.b1{width:500px;height:500px;top:-180px;left:-180px;background:rgba(255,107,43,.12);animation-delay:0s}
.b2{width:400px;height:400px;bottom:-120px;right:-120px;background:rgba(100,80,255,.1);animation-delay:3s}
.b3{width:350px;height:350px;top:40%;right:-80px;background:rgba(0,220,180,.09);animation-delay:6s}
@keyframes blobmove{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(24px,20px) scale(1.1)}}

/* ─── SCREENS ─── */
.scr{position:fixed;inset:0;z-index:10;overflow-y:auto;overflow-x:hidden;display:none;flex-direction:column;align-items:center;-webkit-overflow-scrolling:touch}
.scr.on{display:flex}

/* ═══════════════════ WELCOME ═══════════════════ */
#s-welcome{justify-content:center;padding:44px 22px 56px;text-align:center;background:var(–bg)}
.wlc{max-width:380px;width:100%;position:relative;z-index:2}
.wlc-animals{display:flex;justify-content:center;flex-wrap:wrap;gap:8px;margin-bottom:24px}
.wa{
width:58px;height:58px;border-radius:18px;display:flex;align-items:center;justify-content:center;
font-size:2rem;background:var(–white);border:3px solid #E8E8F8;
box-shadow:0 4px 0 #D0D0E8,0 8px 16px rgba(0,0,0,.08);
animation:wabounce 3s ease-in-out infinite;animation-delay:var(–d,0s);
transition:all .2s var(–sp);
}
@keyframes wabounce{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-10px) rotate(3deg)}}
.wlc-title{font-family:‘Fredoka One’,cursive;font-size:3rem;line-height:1.05;margin-bottom:10px;
background:linear-gradient(135deg,#FF6B2B 0%,#FF2D78 55%,#7C3AED 100%);
-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.wlc-sub{font-size:.98rem;font-weight:800;color:var(–ink2);line-height:1.7;margin-bottom:28px}
.name-wrap{position:relative;margin-bottom:16px}
.name-field{
width:100%;padding:18px 22px;border-radius:20px;background:var(–white);
border:3px solid #E0E0F0;font-family:‘Fredoka One’,cursive;font-size:1.4rem;
color:var(–ink);text-align:center;outline:none;-webkit-appearance:none;
box-shadow:0 4px 0 #D0D0E8,0 8px 20px rgba(0,0,0,.06);transition:all .2s;
}
.name-field::placeholder{color:#C0C0D8}
.name-field:focus{border-color:var(–A);box-shadow:0 4px 0 var(–Ad),0 0 0 5px var(–Ag)}
.bigbtn{
display:block;width:100%;padding:20px 24px;border-radius:20px;border:none;cursor:pointer;
font-family:‘Fredoka One’,cursive;font-size:1.4rem;color:#fff;-webkit-appearance:none;
position:relative;overflow:hidden;transition:all .15s var(–sp);
background:linear-gradient(135deg,#FF6B2B,#FF2D78);
box-shadow:0 8px 0 #AA0040,0 12px 28px rgba(255,45,120,.3);
}
.bigbtn:active{transform:translateY(8px);box-shadow:0 0 0 #AA0040}
.bigbtn::after{content:’’;position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.18) 0%,transparent 50%);border-radius:20px;pointer-events:none}
.wlc-footer{font-size:.78rem;font-weight:800;color:var(–ink3);margin-top:16px;line-height:1.6}

/* ═══════════════════ APP SHELL ═══════════════════ */
#s-app{padding:0 0 84px;justify-content:flex-start;background:var(–bg)}
.page{display:none;flex-direction:column;width:100%;max-width:480px;animation:pagein .3s var(–sp)}
.page.on{display:flex}
@keyframes pagein{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* BOTTOM NAV */
.bnav{
position:fixed;bottom:0;left:0;right:0;z-index:200;
background:rgba(255,255,255,.96);border-top:2px solid #E8E8F4;
display:none;justify-content:space-around;align-items:flex-end;
padding:8px 0 max(env(safe-area-inset-bottom),8px);
backdrop-filter:blur(20px);
}
.bnav.on{display:flex}
.nb{
flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
background:none;border:none;cursor:pointer;-webkit-appearance:none;
font-family:‘Fredoka One’,cursive;font-size:.64rem;color:var(–ink3);
padding:4px 0 2px;transition:all .2s var(–sp);
}
.nb-ic{font-size:1.65rem;display:block;transition:all .25s var(–sp)}
.nb.on{color:var(–A)}
.nb.on .nb-ic{transform:scale(1.25) translateY(-4px);filter:drop-shadow(0 4px 6px var(–Ag))}
.nb-pip{width:6px;height:6px;border-radius:50%;background:var(–A);margin:0 auto;opacity:0;transition:.2s}
.nb.on .nb-pip{opacity:1}

/* ═══════════════════ SECTION HEADER ═══════════════════ */
.sec-header{padding:22px 18px 4px;display:flex;align-items:flex-end;justify-content:space-between}
.sec-title{font-family:‘Fredoka One’,cursive;font-size:2rem;color:var(–ink);line-height:1.1}
.sec-sub{font-size:.88rem;font-weight:800;color:var(–ink2);padding:0 18px 18px;line-height:1.6}
.sec-action{font-family:‘Fredoka One’,cursive;font-size:.82rem;color:var(–A);cursor:pointer;padding:4px 10px;background:var(–Ag);border-radius:50px;border:none;-webkit-appearance:none}

/* ═══════════════════ HOME PAGE ═══════════════════ */
.home-pg{padding:0 0 8px}

/* greeting strip */
.greeting-strip{
margin:18px 18px 0;border-radius:26px;padding:20px 22px;
background:linear-gradient(135deg,var(–A),#FF2D78);
box-shadow:0 6px 0 var(–Ad),0 10px 30px rgba(255,45,120,.25);
position:relative;overflow:hidden;
}
.gs-bg{position:absolute;right:-20px;top:-20px;font-size:7rem;opacity:.15;line-height:1}
.gs-hi{font-family:‘Fredoka One’,cursive;font-size:.85rem;letter-spacing:1px;color:rgba(255,255,255,.7);margin-bottom:2px}
.gs-name{font-family:‘Fredoka One’,cursive;font-size:2.2rem;color:#fff;line-height:1.1}
.gs-sub{font-size:.85rem;font-weight:800;color:rgba(255,255,255,.75);margin-top:4px}
.settings-ico{position:absolute;top:16px;right:16px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.2);border:none;cursor:pointer;font-size:1.1rem;-webkit-appearance:none;transition:.15s var(–sp);display:flex;align-items:center;justify-content:center}
.settings-ico:active{transform:scale(.88)}

/* animal card */
.animal-card{
margin:12px 18px 0;border-radius:26px;padding:22px 20px;background:var(–white);
border:3px solid #E8E8F4;box-shadow:0 6px 0 #D0D0E8,0 12px 32px rgba(0,0,0,.08);
position:relative;overflow:hidden;
}
.ac-stripe{position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(–A),#FF2D78)}
.ac-top{display:flex;align-items:center;gap:14px;margin-bottom:12px}
.ac-emoji{font-size:4rem;animation:floaty 3s ease-in-out infinite;filter:drop-shadow(0 6px 10px var(–Ag))}
@keyframes floaty{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-10px) rotate(4deg)}}
.ac-meta{flex:1}
.ac-type{font-family:‘Fredoka One’,cursive;font-size:.72rem;letter-spacing:3px;color:var(–A);margin-bottom:2px}
.ac-name{font-family:‘Fredoka One’,cursive;font-size:1.9rem;color:var(–ink);line-height:1.1}
.ac-czech{font-size:.88rem;font-weight:800;color:var(–ink2);margin-top:2px}
.ac-desc{font-size:.88rem;font-weight:700;color:var(–ink2);line-height:1.65;margin-bottom:14px}
.ac-stoic-pill{
display:inline-flex;align-items:center;gap:6px;padding:6px 16px;border-radius:50px;
background:linear-gradient(135deg,rgba(124,58,237,.1),rgba(255,45,120,.1));
border:2px solid rgba(124,58,237,.2);
font-family:‘Fredoka One’,cursive;font-size:.78rem;color:#7C3AED;
}

/* no-animal nudge */
.no-animal{
margin:12px 18px 0;border-radius:26px;padding:24px 20px;background:var(–white);
border:3px dashed #D0D0E8;text-align:center;
}
.na-em{font-size:3.5rem;display:block;margin-bottom:10px;animation:floaty 3s ease-in-out infinite}
.na-t{font-family:‘Fredoka One’,cursive;font-size:1.4rem;color:var(–ink);margin-bottom:6px}
.na-s{font-size:.88rem;font-weight:700;color:var(–ink2);margin-bottom:16px;line-height:1.6}
.go-btn{
padding:14px 28px;border-radius:18px;border:none;cursor:pointer;-webkit-appearance:none;
font-family:‘Fredoka One’,cursive;font-size:1rem;color:#fff;
background:linear-gradient(135deg,var(–A),#FF2D78);
box-shadow:0 5px 0 var(–Ad),0 8px 20px var(–Ag);transition:all .15s var(–sp);
}
.go-btn:active{transform:translateY(5px);box-shadow:0 0 0 var(–Ad)}

/* wisdom card */
.wisdom-card{
margin:12px 18px 0;border-radius:26px;padding:20px 22px;background:var(–white);
border:3px solid #E8F0FF;box-shadow:0 4px 0 #C8D8F0,0 8px 24px rgba(0,80,255,.06);
background:linear-gradient(135deg,#F5F0FF,#EEF5FF);
}
.wc-label{font-family:‘Fredoka One’,cursive;font-size:.72rem;letter-spacing:2px;color:#7C3AED;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.wc-quote{font-size:1rem;font-weight:800;font-style:italic;color:var(–ink);line-height:1.7;margin-bottom:8px}
.wc-by{font-family:‘Fredoka One’,cursive;font-size:.82rem;color:#7C3AED}

/* quick tiles */
.tiles-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:12px 18px 0}
.tile{
border-radius:22px;padding:18px 16px;cursor:pointer;-webkit-appearance:none;border:none;
background:var(–white);border:3px solid #E8E8F4;text-align:center;width:100%;
box-shadow:0 5px 0 #D0D0E8,0 8px 20px rgba(0,0,0,.06);transition:all .18s var(–sp);
}
.tile:active{transform:translateY(5px);box-shadow:0 0 0 #D0D0E8}
.tile-ic{font-size:2.2rem;display:block;margin-bottom:8px}
.tile-t{font-family:‘Fredoka One’,cursive;font-size:.95rem;color:var(–ink);margin-bottom:2px}
.tile-d{font-size:.72rem;font-weight:800;color:var(–ink3);line-height:1.3}
.tile.feel{border-color:#FFE040;box-shadow:0 5px 0 #CCA000}
.tile.jour{border-color:#00E5CC;box-shadow:0 5px 0 #009988}

/* ═══════════════════ QUIZ PAGE ═══════════════════ */
.quiz-pg{padding:0 0 8px}

/* intro */
.qi-wrap{padding:22px 18px 16px;text-align:center}
.qi-em{font-size:5rem;display:block;margin-bottom:14px;animation:floaty 3s ease-in-out infinite}
.qi-title{font-family:‘Fredoka One’,cursive;font-size:2.4rem;
background:linear-gradient(135deg,#FF9500,#FF2D78);
-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
margin-bottom:8px}
.qi-sub{font-size:.92rem;font-weight:800;color:var(–ink2);line-height:1.7;margin-bottom:20px}

/* animal parade */
.parade{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px}
.pa-cell{
aspect-ratio:1;border-radius:16px;background:var(–white);border:3px solid #E8E8F4;
box-shadow:0 4px 0 #D0D0E8;display:flex;flex-direction:column;align-items:center;
justify-content:center;gap:3px;transition:all .2s var(–sp);cursor:default;
}
.pa-cell:nth-child(odd){animation:floaty 3s ease-in-out infinite}
.pa-cell:nth-child(even){animation:floaty 3s ease-in-out infinite;animation-delay:1.5s}
.pa-em{font-size:1.8rem}
.pa-nm{font-family:‘Fredoka One’,cursive;font-size:.6rem;color:var(–ink3);text-align:center;line-height:1.2;padding:0 2px}
.start-quiz-btn{
display:block;width:100%;padding:20px;border-radius:22px;border:none;cursor:pointer;
font-family:‘Fredoka One’,cursive;font-size:1.3rem;color:#fff;-webkit-appearance:none;
background:linear-gradient(135deg,#FF9500,#FF2D78);
box-shadow:0 7px 0 #AA0020,0 12px 28px rgba(255,45,120,.3);
transition:all .15s var(–sp);
}
.start-quiz-btn:active{transform:translateY(7px);box-shadow:0 0 0 #AA0020}

/* quiz in progress */
.qip{display:none}.qip.on{display:block;padding:18px 18px 8px}
.q-bar-wrap{margin-bottom:20px}
.q-bar{height:10px;background:#E8E8F4;border-radius:10px;overflow:hidden;margin-bottom:6px;box-shadow:inset 0 2px 4px rgba(0,0,0,.08)}
.q-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,var(–A),#FF2D78);transition:width .5s var(–ease);box-shadow:0 2px 8px rgba(255,45,120,.35)}
.q-meta{display:flex;justify-content:space-between;align-items:center}
.q-num{font-family:‘Fredoka One’,cursive;font-size:.8rem;color:var(–ink3)}
.q-dim-tag{
font-family:‘Fredoka One’,cursive;font-size:.75rem;padding:4px 14px;border-radius:50px;
background:var(–white);border:2px solid #E0E0F0;color:var(–A);
box-shadow:0 2px 0 #D0D0E8;
}
.q-card{
background:var(–white);border-radius:26px;padding:26px 22px;
border:3px solid #E8E8F4;box-shadow:0 6px 0 #D0D0E8,0 12px 32px rgba(0,0,0,.08);
margin-bottom:16px;animation:qcardIn .35s var(–sp);
}
@keyframes qcardIn{from{opacity:0;transform:translateY(18px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.q-qnum{font-family:‘Fredoka One’,cursive;font-size:.78rem;color:var(–ink3);margin-bottom:10px}
.q-qtext{font-family:‘Fredoka One’,cursive;font-size:1.5rem;color:var(–ink);line-height:1.3}
.q-opts{display:flex;flex-direction:column;gap:11px;margin-top:18px}
.qo{
display:flex;align-items:center;gap:13px;padding:16px 18px;
border-radius:18px;border:3px solid #E8E8F4;background:var(–bg);
cursor:pointer;-webkit-appearance:none;text-align:left;width:100%;
font-size:.95rem;font-weight:800;color:var(–ink2);
box-shadow:0 4px 0 #D0D0E8;transition:all .18s var(–sp);
}
.qo:active,.qo.picked{
background:linear-gradient(135deg,rgba(255,107,43,.08),rgba(255,45,120,.06));
border-color:var(–A);color:var(–ink);
transform:scale(.97) translateY(2px);box-shadow:0 0 0 #D0D0E8;
}
.qo-lbl{
width:34px;height:34px;border-radius:50%;flex-shrink:0;
background:var(–white);border:3px solid #E0E0F0;
display:flex;align-items:center;justify-content:center;
font-family:‘Fredoka One’,cursive;font-size:.88rem;color:var(–A);
box-shadow:0 3px 0 #D0D0E8;
}
.qo-ico{font-size:1.6rem;flex-shrink:0}

/* portrait section */
.portrait-pg{display:none}.portrait-pg.on{display:block;padding:0 18px 8px}
.port-header{text-align:center;padding:22px 0 16px}
.port-title{font-family:‘Fredoka One’,cursive;font-size:1.9rem;color:var(–ink);margin-bottom:6px}
.port-title span{color:var(–A)}
.port-sub{font-size:.88rem;font-weight:700;color:var(–ink2);line-height:1.65}

/* key setup */
.key-setup{
border-radius:22px;padding:18px 20px;margin-bottom:14px;
background:linear-gradient(135deg,#FFFCE8,#FFF8D0);
border:3px solid #FFE040;box-shadow:0 4px 0 #CCA000;
}
.ks-title{font-family:‘Fredoka One’,cursive;font-size:.9rem;color:#AA6600;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.ks-row{display:flex;gap:8px}
.ks-input{
flex:1;padding:11px 14px;border-radius:14px;background:rgba(255,255,255,.8);
border:2px solid #FFD000;font-family:‘Nunito’,sans-serif;font-weight:700;
font-size:.85rem;color:var(–ink);outline:none;-webkit-appearance:none;
}
.ks-input::placeholder{color:#C8A000}
.ks-save{padding:11px 16px;border-radius:14px;border:none;cursor:pointer;-webkit-appearance:none;
background:linear-gradient(135deg,#FF9500,#FF6B00);font-family:‘Fredoka One’,cursive;
font-size:.85rem;color:#fff;box-shadow:0 3px 0 #AA3300;transition:all .15s var(–sp)}
.ks-save:active{transform:translateY(3px);box-shadow:none}
.ks-info{font-size:.73rem;font-weight:700;color:#AA7700;margin-top:6px;line-height:1.5}
.ks-info a{color:#FF6B00;text-decoration:underline}

/* upload zone */
/* upload zone — label-based, no onclick conflicts */
.upload-label{
display:block;border-radius:24px;overflow:hidden;position:relative;min-height:240px;
background:var(–white);border:3px dashed #D0D0E8;
cursor:pointer;transition:all .2s;margin-bottom:14px;
box-shadow:0 4px 0 #D0D0E8,0 8px 20px rgba(0,0,0,.06);
}
.upload-label:hover,.upload-label.drag{border-color:var(–A);background:rgba(255,107,43,.03)}
.upload-inner{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:40px 20px;transition:opacity .3s}
.upload-inner.hidden{display:none}
.upload-preview{display:none;width:100%}
.upload-preview.on{display:block}
.upload-preview img{display:block;width:100%;border-radius:21px}
.uo-ic{font-size:3.5rem;animation:floaty 3s ease-in-out infinite;display:block}
.uo-t{font-family:‘Fredoka One’,cursive;font-size:1.1rem;color:var(–ink2);text-align:center}
.uo-s{font-size:.8rem;font-weight:700;color:var(–ink3);text-align:center}
.upload-file{display:none}

/* result */
.result-wrap{display:none;margin-bottom:14px}.result-wrap.on{display:block}
.result-img-box{
border-radius:22px;overflow:hidden;position:relative;
box-shadow:0 8px 0 var(–Ad),0 16px 40px var(–Ag);
border:4px solid var(–A);
}
.result-img-box img{display:block;width:100%}
.result-label{
position:absolute;inset-x:0;bottom:0;
background:linear-gradient(transparent,rgba(0,0,0,.85));
padding:40px 18px 16px;
}
.rl-type{font-family:‘Fredoka One’,cursive;font-size:.72rem;letter-spacing:3px;color:var(–A);margin-bottom:2px}
.rl-name{font-family:‘Fredoka One’,cursive;font-size:1.6rem;color:#fff}

.gen-btn{
display:block;width:100%;padding:18px;border-radius:20px;border:none;cursor:pointer;
font-family:‘Fredoka One’,cursive;font-size:1.15rem;color:#fff;-webkit-appearance:none;
background:linear-gradient(135deg,var(–A),#FF2D78);
box-shadow:0 6px 0 var(–Ad),0 10px 28px var(–Ag);
transition:all .15s var(–sp);position:relative;overflow:hidden;margin-bottom:10px;
}
.gen-btn:active{transform:translateY(6px);box-shadow:0 0 0 var(–Ad)}
.gen-btn:disabled{opacity:.5;pointer-events:none}
.gen-btn.loading::after{
content:’’;position:absolute;inset:0;
background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);
animation:shimmer 1.4s ease-in-out infinite;
}
@keyframes shimmer{from{transform:translateX(-100%)}to{transform:translateX(100%)}}
.share-row{display:flex;gap:10px;margin-bottom:8px}
.share-btn{
flex:1;padding:14px;border-radius:16px;border:none;cursor:pointer;-webkit-appearance:none;
font-family:‘Fredoka One’,cursive;font-size:.9rem;color:#fff;
transition:all .15s var(–sp);
}
.share-btn:active{transform:translateY(4px)}
.sb-share{background:linear-gradient(135deg,var(–A),#FF2D78);box-shadow:0 4px 0 var(–Ad)}
.sb-retry{background:var(–white);border:3px solid #E0E0F0;color:var(–ink2);box-shadow:0 4px 0 #D0D0E8}
.demo-banner{
padding:12px 16px;border-radius:16px;margin-bottom:10px;
background:linear-gradient(135deg,#FFFCE8,#FFF5D0);
border:2px solid #FFE040;
font-size:.78rem;font-weight:800;color:#886600;line-height:1.55;text-align:center;
}
.demo-banner a{color:#FF6B00;text-decoration:underline}

/* ═══════════════════ REVEAL SCREEN ═══════════════════ */
#s-reveal{
justify-content:center;text-align:center;padding:48px 22px 60px;
background:var(–bg);z-index:300;
}
.rev-burst{position:fixed;inset:0;pointer-events:none;z-index:1;overflow:hidden}
.conf-p{position:absolute;font-size:1.7rem;animation:confall var(–d,3s) ease-in var(–del,0s) both}
@keyframes confall{from{transform:translateY(-10px) rotate(0deg);opacity:1}to{transform:translateY(110vh) rotate(900deg);opacity:0}}
.rev-inner{position:relative;z-index:2;max-width:340px;width:100%}
.rev-orb{

function startApp(){
  const n = document.getElementById('nameIn').value.trim();
  if(!n){
    const f = document.getElementById('nameIn');
    f.style.borderColor='#FF2D78';
    f.placeholder='Napiš své jméno! 😊';
    f.focus(); return;
  }
  playerName = n;
  falKey = localStorage.getItem('fal_key')||'';
  currentType = localStorage.getItem('animal_type')||null;

  document.getElementById('s-welcome').classList.remove('on');
  document.getElementById('s-app').classList.add('on');
  document.getElementById('bnav').classList.add('on');

  setAnimalCSS(currentType ? ANIMALS[currentType] : ANIMALS['ENFP']);
  buildHome();
  buildQuiz();
  buildFeelings();
  buildJournal();
  goTab('home');
}

function setAnimalCSS(an){
  if(!an) return;
  document.documentElement.style.setProperty('--A', an.color);
  document.documentElement.style.setProperty('--Ad', an.dark);
  document.documentElement.style.setProperty('--Ag', an.glow);
  // blobs
  document.querySelectorAll('.blob').forEach((b,i)=>{
    const colors = [an.color+'28', '#7C3AED20', '#06B6D420'];
    b.style.background = colors[i]||an.color+'18';
  });
}

function buildHome(){
  const an = currentType ? ANIMALS[currentType] : null;
  const q = DAILY_QUOTES[new Date().getDay() % DAILY_QUOTES.length];
  let html = '';

  // greeting
  html += `<div class="greeting-strip">
    <button class="settings-ico" onclick="openSettings()">⚙️</button>
    <div class="gs-bg">${an ? an.emoji : '🌟'}</div>
    <div class="gs-hi">Ahoj,</div>
    <div class="gs-name">${playerName}! 👋</div>
    <div class="gs-sub">${an ? `Typ: ${currentType} · ${an.name}` : 'Jaké jsi zvíře?'}</div>
  </div>`;

  // animal card or nudge
  if(an){
    html += `<div class="animal-card">
      <div class="ac-stripe"></div>
      <div class="ac-top">
        <span class="ac-emoji">${an.emoji}</span>
        <div class="ac-meta">
          <div class="ac-type">${currentType}</div>
          <div class="ac-name">${an.name}</div>
          <div class="ac-czech">${an.czech} · ${an.power}</div>
        </div>
      </div>
      <div class="ac-desc">${an.desc}</div>
      <div class="ac-stoic-pill">✦ ${an.stoic}</div>
    </div>`;
  } else {
    html += `<div class="no-animal">
      <span class="na-em">🐾</span>
      <div class="na-t">Jaké jsi zvíře?</div>
      <div class="na-s">Udělej rychlý kvíz a zjisti svůj osobnostní typ — pak nech AI vytvořit tvůj portrét!</div>
      <button class="go-btn" onclick="goTab('quiz')">🦁 Jít na kvíz!</button>
    </div>`;
  }

  // daily wisdom
  html += `<div class="wisdom-card">
    <div class="wc-label">✦ Moudrost dne ✦</div>
    <div class="wc-quote">"${q.q}"</div>
    <div class="wc-by">— ${q.by}</div>
  </div>`;

  // tiles
  html += `<div class="tiles-row">
    <button class="tile feel" onclick="goTab('feelings')">
      <span class="tile-ic">💛</span>
      <div class="tile-t">Jak se cítím?</div>
      <div class="tile-d">Stoická moudrost pro každou emoci</div>
    </button>

      <span class="tile-ic">📖</span>
      <div class="tile-t">Deník</div>
      <div class="tile-d">Zapiš své myšlenky a pocity</div>
    </button>
  </div>`;

  html += '<div style="height:8px"></div>';
  document.getElementById('home-body').innerHTML = html;
}

  const an = currentType ? ANIMALS[currentType] : null;

  // Intro
  let intro = `<div class="qi-wrap">
    <span class="qi-em">🎯</span>
    <div class="qi-title">Najdi své zvíře!</div>

    intro += `<div class="pa-cell"><div class="pa-em">${v.emoji}</div><div class="pa-nm">${v.name}</div></div>`;

function handlePhoto(e){
  const f = e.target.files[0]; if(!f) return;
  window._photoFile = f; // keep original File for FormData (avoids iOS DataCloneError)
  const r = new FileReader();
  r.onload = ev => {
    photoData = ev.target.result;
    // Show preview — hide the prompt text, show the image
    const inner = document.getElementById('upload-inner');
    const preview = document.getElementById('upload-preview');
    const previewImg = document.getElementById('preview-img');
    if(inner) inner.classList.add('hidden');
    if(preview && previewImg){
      previewImg.src = photoData;
      preview.classList.add('on');
    }
    // Update button to make clear the next step
    const btn = document.getElementById('gen-btn');
    if(btn){
      const an = ANIMALS[currentType];
      btn.innerHTML = `${an ? an.emoji : '🎨'} Fotka nahrána — klepni pro generování!`;
      btn.style.animation = 'none';
      // brief bounce to draw attention
      requestAnimationFrame(()=>{
        btn.style.transform='scale(1.04)';
        setTimeout(()=>{ btn.style.transform=''; }, 200);
      });
    }
    // Smooth scroll to button
    setTimeout(()=>{ btn && btn.scrollIntoView({behavior:'smooth', block:'nearest'}); }, 150);
  };
  r.readAsDataURL(f);
}

async function generatePortrait(){
  const an = ANIMALS[currentType];
  const btn = document.getElementById('gen-btn');

  if(!photoData){
    // Flash the upload zone to guide the user
    const label = document.getElementById('upload-label');
    if(label){
      label.style.borderColor = 'var(--A)';
      label.style.transform = 'scale(1.02)';
      setTimeout(()=>{ label.style.borderColor=''; label.style.transform=''; }, 600);
    }
    btn.innerHTML = `📷 Nejdřív nahraj fotku výše!`;
    setTimeout(()=>{ btn.innerHTML = `${an.emoji} Vygenerovat portrét!`; }, 1800);
    return;
  }

  btn.disabled = true;
  btn.classList.add('loading');

  if(!falKey){
    // Demo mode — clear message + styled placeholder card
    btn.innerHTML = '🎨 Demo režim — generuji ukázku...';
    await new Promise(r=>setTimeout(r,1800));
    showDemoResult(an);
    btn.classList.remove('loading');
    btn.disabled = false;
    btn.style.display='none';
    document.getElementById('share-row').style.display='flex';
    return;
  }

  try{
    // ── STEP 1: Use base64 data URL directly — no upload needed ──────────────
    // fal.ai models accept base64 data URLs as image_url, avoiding all CORS issues
    btn.innerHTML = '<span class="dots"><span class="dt"></span><span class="dt"></span><span class="dt"></span></span> Připravuji...';
    const imageUrl = photoData; // base64 data URL passed directly

    // ── STEP 2: Generate — base64 sent directly in JSON body ────────────────
    btn.innerHTML = '<span class="dots"><span class="dt"></span><span class="dt"></span><span class="dt"></span></span> AI magie probíhá... ✨';
    const genResp = await fetch('https://fal.run/fal-ai/fast-sdxl/image-to-image', {
      method: 'POST',
      headers: {'Content-Type':'application/json', 'Authorization': 'Key ' + falKey},
      body: JSON.stringify({
        image_url: imageUrl,
        prompt: an.prompt + ', portrait of the person in the photo as this animal character, Pixar 3D animation style, vibrant, safe for children, fun, expressive',
        negative_prompt: 'scary, violent, gore, nsfw, ugly, blurry, deformed',
        strength: 0.7,
        num_inference_steps: 4,
        num_images: 1
      })
    });
    const genData = await genResp.json();
    console.log('fal.ai response:', JSON.stringify(genData));
    const resultUrl = genData?.images?.[0]?.url || genData?.image?.url || genData?.output?.images?.[0]?.url;
    if(!resultUrl) throw new Error('Generation failed: ' + JSON.stringify(genData));

    // ── STEP 4: Show result ──────────────────────────────────────────
    generatedImageUrl = resultUrl;
    const img = document.getElementById('result-img');
    img.src = resultUrl;
    img.onload = () => {
      document.getElementById('result-wrap').classList.add('on');
      img.scrollIntoView({behavior:'smooth', block:'nearest'});
    };
    document.getElementById('share-row').style.display='flex';

  } catch(err){
    console.error('fal.ai error:', err);
    // Show error + fallback to demo
    btn.innerHTML = '⚠️ Chyba — zkouším záložní režim...';
    await new Promise(r=>setTimeout(r,800));
    showDemoResult(an);
    // Show the error message in a small note
    const note = document.createElement('div');
    note.style.cssText='padding:10px 14px;background:#FFF0F0;border:2px solid #FFB0B0;border-radius:12px;font-size:.75rem;color:#AA3333;margin-bottom:8px;word-break:break-all;line-height:1.5';
    note.textContent = '⚠️ Chyba API: ' + err.message + ' — zkontroluj svůj fal.ai klíč v nastavení.';
    const shareRow = document.getElementById('share-row');
    shareRow.parentNode.insertBefore(note, shareRow);
    document.getElementById('share-row').style.display='flex';
  }

  btn.classList.remove('loading');
  btn.disabled = false;
  btn.style.display='none';
}

function showDemoResult(an){
  // Build a proper demo card that composites the user's photo with the animal theme
  const cv = document.createElement('canvas');
  cv.width=400; cv.height=500;
  const ctx = cv.getContext('2d');

  // Parse animal color for gradients
  const hex = an.color;
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);

  // Background gradient
  const bg = ctx.createLinearGradient(0,0,400,500);
  bg.addColorStop(0,`rgba(${r},${g},${b},.18)`);
  bg.addColorStop(1,`rgba(${r},${g},${b},.04)`);
  ctx.fillStyle='#FAFAFE'; ctx.fillRect(0,0,400,500);
  ctx.fillStyle=bg; ctx.fillRect(0,0,400,500);

  // Draw user photo if available
  const drawCard = (photoImg) => {
    // Photo circle clipped
    if(photoImg){
      ctx.save();
      ctx.beginPath();
      ctx.arc(200, 170, 130, 0, Math.PI*2);
      ctx.clip();
      // cover-fit the photo
      const pr = photoImg.naturalWidth/photoImg.naturalHeight;
      let sw,sh,sx,sy;
      if(pr>1){sh=photoImg.naturalHeight;sw=sh;sx=(photoImg.naturalWidth-sw)/2;sy=0}
      else{sw=photoImg.naturalWidth;sh=sw;sx=0;sy=(photoImg.naturalHeight-sh)/2}
      ctx.drawImage(photoImg,sx,sy,sw,sh,70,40,260,260);
      ctx.restore();
    }

    // Circular border with animal color
    ctx.strokeStyle=an.color; ctx.lineWidth=6;
    ctx.beginPath(); ctx.arc(200,170,132,0,Math.PI*2); ctx.stroke();
    // Glow ring
    ctx.strokeStyle=an.color+'44'; ctx.lineWidth=18;
    ctx.beginPath(); ctx.arc(200,170,144,0,Math.PI*2); ctx.stroke();

    // Big animal emoji overlay (bottom-right of circle)
    ctx.font='56px serif'; ctx.textAlign='center';
    ctx.fillText(an.emoji, 300, 272);

    // White card band at bottom
    ctx.fillStyle='#FFFFFF'; ctx.fillRect(0,318,400,182);
    // Colored top edge
    ctx.fillStyle=an.color; ctx.fillRect(0,318,400,5);

    // Type code
    ctx.font='700 13px Fredoka One, sans-serif';
    ctx.fillStyle=an.color; ctx.fillText(currentType, 200, 345);
    // Name
    ctx.font='800 36px Fredoka One, sans-serif';
    ctx.fillStyle='#1A1A2E'; ctx.fillText(an.name, 200, 386);
    // Superpower
    ctx.font='700 15px Nunito, sans-serif';
    ctx.fillStyle='#5A5A7A'; ctx.fillText('⚡ '+an.power, 200, 412);
    // Player name
    ctx.font='700 13px Nunito, sans-serif';
    ctx.fillStyle='#9999BB'; ctx.fillText(playerName, 200, 434);
    // Stoic
    ctx.fillStyle=an.color+'22';
    ctx.beginPath(); ctx.roundRect(130,446,140,22,11); ctx.fill();
    ctx.font='700 11px Nunito, sans-serif';
    ctx.fillStyle=an.color; ctx.fillText('✦ '+an.stoic+' ✦', 200, 461);
    // Demo watermark
    ctx.font='600 10px Nunito, sans-serif';
    ctx.fillStyle='#CCCCDD'; ctx.fillText('DEMO · Přidej fal.ai klíč pro skutečný AI portrét', 200, 490);

    const url = cv.toDataURL('image/png');
    generatedImageUrl = url;
    document.getElementById('result-img').src = url;
    document.getElementById('result-wrap').classList.add('on');
    setTimeout(()=>document.getElementById('result-wrap').scrollIntoView({behavior:'smooth',block:'nearest'}),100);
  };

  if(photoData){
    const img = new Image();
    img.onload = () => drawCard(img);
    img.onerror = () => drawCard(null);
    img.src = photoData;
  } else {
    // No photo — just show big emoji + animal info
    ctx.font='110px serif'; ctx.textAlign='center'; ctx.fillText(an.emoji, 200, 220);
    drawCard(null);
  }
}

function startQuiz(){
  scores = {E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};
  qIdx = 0;
  document.getElementById('quiz-intro').style.display='none';
  document.getElementById('portrait-pg').classList.remove('on');
  const qip = document.getElementById('qip');
  qip.classList.add('on');
  renderQ();
}

function renderQ(){
  const q = QUIZ[qIdx];
  const pct = Math.round(((qIdx)/QUIZ.length)*100);
  document.getElementById('qip').innerHTML = `
    <div class="q-bar-wrap">
      <div class="q-bar"><div class="q-fill" style="width:${pct}%"></div></div>
      <div class="q-meta">
        <span class="q-num">Otázka ${qIdx+1} z ${QUIZ.length}</span>
        <span class="q-dim-tag">${q.dim}</span>
      </div>
    </div>
    <div class="q-card">
      <div class="q-qnum">Otázka ${qIdx+1}</div>
      <div class="q-qtext">${q.q}</div>
      <div class="q-opts">
        <button class="qo" onclick="pickAnswer('A')">
          <span class="qo-lbl">A</span>
          <span class="qo-ico">${q.aico}</span>
          ${q.a}
        </button>
        <button class="qo" onclick="pickAnswer('B')">
          <span class="qo-lbl">B</span>
          <span class="qo-ico">${q.bico}</span>
          ${q.b}
        </button>
      </div>
    </div>`;
}

function pickAnswer(choice){
  const q = QUIZ[qIdx];
  if(q.dim_code==='EI') choice==='A'?scores.E++:scores.I++;
  else if(q.dim_code==='SN') choice==='A'?scores.S++:scores.N++;
  else if(q.dim_code==='TF') choice==='A'?scores.T++:scores.F++;
  else choice==='A'?scores.J++:scores.P++;

  const btns = document.querySelectorAll('.qo');
  btns[choice==='A'?0:1].classList.add('picked');
  setTimeout(()=>{
    qIdx++;
    if(qIdx < QUIZ.length) renderQ();
    else finishQuiz();
  }, 300);
}

function calcType(){
  let t='';
  t += scores.E>=scores.I?'E':'I';
  t += scores.S>=scores.N?'S':'N';
  t += scores.T>=scores.F?'T':'F';
  t += scores.J>=scores.P?'J':'P';
  return t;
}

function finishQuiz(){
  const type = calcType();
  currentType = type;
  localStorage.setItem('animal_type', type);
  const an = ANIMALS[type];
  setAnimalCSS(an);

  document.getElementById('qip').classList.remove('on');
  document.getElementById('quiz-intro').style.display='';

  // FULL SCREEN REVEAL
  const burst = document.getElementById('rev-burst');
  burst.innerHTML = '';
  an.particles.forEach((em,i)=>{
    for(let j=0;j<4;j++){
      const el=document.createElement('span');el.className='conf-p';el.textContent=em;
      el.style.cssText=`left:${Math.random()*100}%;--d:${2+Math.random()*3}s;--del:${i*.12+j*.35}s;font-size:${1.3+Math.random()*1.2}rem`;
      burst.appendChild(el);
    }
  });

  document.getElementById('rev-inner').innerHTML = `
    <div class="rev-orb" style="border-color:${an.color};box-shadow:0 12px 0 ${an.dark},0 20px 60px ${an.glow}">
      <div class="rev-ring" style="background:conic-gradient(${an.color} 0%,transparent 55%,${an.color} 100%)"></div>
      <span class="rev-em">${an.emoji}</span>
    </div>
    <div class="rev-type">${type}</div>
    <div class="rev-name" style="color:${an.color}">${an.name}</div>
    <div class="rev-czech">${an.czech}</div>
    <div class="rev-power">⚡ ${an.power}</div>
    <div class="rev-desc">${an.desc}</div>
    <div class="rev-stoic">✦ ${an.stoic}</div>
    <div class="rev-acts">
      <button class="ract" style="background:linear-gradient(135deg,${an.color},#FF2D78)" onclick="goPortrait()">
        🎨 Vytvořit AI portrét ${an.name}a!
      </button>
      <button class="ract sec" onclick="closeReveal()">Zpět na domovskou stránku</button>
    </div>`;

  document.getElementById('s-reveal').classList.add('on');
  buildHome();
}

function entryHTML(e,i,wall){
const isPub = e.pub;
return `<div class="entry-item ${isPub?'pub':''}"> <div class="ei-top"> <span class="ei-tag ${isPub?'pub':''}">${e.mood||'💭'}</span> <span class="ei-date">${new Date(e.ts).toLocaleDateString('cs-CZ')}</span> </div> <div class="ei-text">${e.text.substring(0,200)}${e.text.length>200?'...':''}</div> ${!wall?`<button class="del-btn" onclick="delEntry(${i})">🗑️</button>`:’’}

  </div>`;
}

function jTab(t){
[‘write’,‘mine’,‘wall’].forEach(x=>{
document.getElementById(‘jt-’+x)?.classList.toggle(‘on’,x===t);
document.getElementById(‘jtc-’+x)?.classList.toggle(‘on’,x===t);
});
if(t===‘mine’||t===‘wall’) buildJournal();
}

function selMood(btn){
document.querySelectorAll(’#jtc-write .mc’).forEach(b=>b.classList.remove(‘sel’));
btn.classList.add(‘sel’);
}

function setPriv(priv){
jPriv = priv;
document.getElementById(‘pb-priv’).className=‘pb’+(priv?’ prv’:’’);
document.getElementById(‘pb-pub’).className=‘pb’+(!priv?’ pub’:’’);
}

function saveEntry(){
const text = document.getElementById(‘j-text’).value.trim();
const mood = document.querySelector(’#jtc-write .mc.sel’)?.textContent||’’;
if(!text) return;
const entries = getEntries();
entries.unshift({text,mood,pub:!jPriv,ts:Date.now(),name:playerName});
localStorage.setItem(‘journal_v6’, JSON.stringify(entries));
document.getElementById(‘j-text’).value=’’;
document.querySelectorAll(’#jtc-write .mc’).forEach(b=>b.classList.remove(‘sel’));
const fl=document.getElementById(‘jflash’);fl.classList.add(‘on’);
setTimeout(()=>fl.classList.remove(‘on’),2500);
}

function delEntry(i){
const entries=getEntries();entries.splice(i,1);
localStorage.setItem(‘journal_v6’,JSON.stringify(entries));
buildJournal();
}

function getEntries(){
try{return JSON.parse(localStorage.getItem(‘journal_v6’)||’[]’)}catch{return []}
}

/* ══════════════════════════════════════════════════
SETTINGS
══════════════════════════════════════════════════ */
function openSettings(){
document.getElementById(‘modal-key’).value = falKey;
document.getElementById(‘modal-ov’).classList.add(‘on’);
}
function saveSettings(){
falKey = document.getElementById(‘modal-key’).value.trim();
localStorage.setItem(‘fal_key’, falKey);
document.getElementById(‘modal-ov’).classList.remove(‘on’);
buildPortraitSection();
}

/* ══════════════════════════════════════════════════
NAV
══════════════════════════════════════════════════ */
function goTab(tab, skipAnim){
[‘home’,‘quiz’,‘feelings’,‘journal’].forEach(t=>{
document.getElementById(‘pg-’+t).classList.toggle(‘on’,t===tab);
document.getElementById(‘nb-’+t).classList.toggle(‘on’,t===tab);
});
if(!skipAnim) window.scrollTo({top:0, behavior:‘smooth’});
}
</script>
